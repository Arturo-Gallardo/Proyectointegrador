spring:
  application:
    name: personalmetrics-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:personalmetrics}
    username: ${DB_USER:personalmetrics}
    password: ${DB_PASSWORD:personalmetrics}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-me-use-at-least-thirty-two-characters-long-secret}
  expiration-ms: 86400000

logging:
  level:
    org.hibernate.SQL: warn
